<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SoundWave — Music For Everyone</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
  --glass:rgba(255,255,255,0.04); --glass-border:rgba(255,255,255,0.08);
  --accent:#7c5cff; --accent2:#ff5cf2; --accent3:#5cffe4;
  --text:#f0f0ff; --muted:#6b6b8a; --danger:#ff4d6d; --success:#4dffb4;
  --font-head:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  --player-h:88px; --sidebar-w:250px; --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 800px 600px at 10% 0%,rgba(124,92,255,.13) 0%,transparent 70%),
  radial-gradient(ellipse 500px 400px at 90% 90%,rgba(255,92,242,.09) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:1fr var(--player-h);height:100vh;position:relative;z-index:1}

/* ── SIDEBAR ── */
.sidebar{grid-row:1;grid-column:1;background:rgba(8,8,14,.97);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;padding:22px 14px;overflow-y:auto}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;padding:0 8px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-text{font-family:var(--font-head);font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;padding:0 10px;margin-bottom:6px;margin-top:16px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;cursor:pointer;transition:all .2s;color:var(--muted);font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--glass);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(124,92,255,.22),rgba(255,92,242,.1));color:var(--text);border:1px solid rgba(124,92,255,.3)}
.nav-item .ico{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.upload-sidebar{margin-top:auto;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:13px;padding:13px;cursor:pointer;color:#fff;font-family:var(--font-head);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .3s;letter-spacing:.03em}
.upload-sidebar:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,92,255,.4)}

/* ── MAIN ── */
.main{grid-row:1;grid-column:2;overflow-y:auto;padding:26px 30px 20px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.search-wrap{flex:1;position:relative}
.search-ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
.search-input{width:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:13px;padding:12px 18px 12px 44px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:all .3s;backdrop-filter:blur(10px)}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent);background:rgba(124,92,255,.07);box-shadow:0 0 0 3px rgba(124,92,255,.12)}
.upload-top-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:13px;padding:12px 22px;cursor:pointer;color:#fff;font-family:var(--font-head);font-size:13px;font-weight:700;white-space:nowrap;transition:all .3s;letter-spacing:.03em}
.upload-top-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,92,255,.4)}

/* ── SECTION TITLES ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;margin-top:6px}
.sec-title{font-family:var(--font-head);font-size:17px;font-weight:700}
.sec-more{font-size:12px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:var(--font-body)}
.sec-more:hover{text-decoration:underline}

/* ── HERO BANNER ── */
.hero{background:linear-gradient(135deg,rgba(124,92,255,.25),rgba(255,92,242,.15));border:1px solid rgba(124,92,255,.25);border-radius:20px;padding:28px 30px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.hero-text h1{font-family:var(--font-head);font-size:28px;font-weight:800;line-height:1.2;margin-bottom:8px}
.hero-text h1 span{background:linear-gradient(90deg,var(--accent3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--muted);font-size:14px;max-width:380px;line-height:1.6}
.hero-art{font-size:72px;line-height:1;flex-shrink:0}

/* ── SONG CARDS horizontal scroll ── */
.cards-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scrollbar-width:thin;scrollbar-color:var(--glass-border) transparent}
.cards-row::-webkit-scrollbar{height:4px}
.cards-row::-webkit-scrollbar-track{background:transparent}
.cards-row::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:4px}

.song-card{flex-shrink:0;width:155px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .25s;backdrop-filter:blur(8px)}
.song-card:hover{transform:translateY(-4px);border-color:rgba(124,92,255,.4);background:rgba(124,92,255,.1)}
.song-card.playing{border-color:var(--accent);background:rgba(124,92,255,.15)}
.card-cover{width:100%;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:32px;position:relative;overflow:hidden}
.card-cover .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:10px;font-size:26px}
.song-card:hover .play-overlay{opacity:1}
.song-card.playing .play-overlay{opacity:1;background:rgba(124,92,255,.3)}
.card-title{font-family:var(--font-head);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-artist{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-plays{font-size:10.5px;color:var(--muted);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ── SONG LIST ── */
.song-list{display:flex;flex-direction:column;gap:4px}
.song-row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.song-row:hover{background:var(--glass);border-color:var(--glass-border)}
.song-row.playing{background:rgba(124,92,255,.12);border-color:rgba(124,92,255,.3)}
.row-num{width:22px;text-align:center;color:var(--muted);font-size:13px;flex-shrink:0}
.row-cover{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-artist{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-genre{font-size:11px;color:var(--accent);background:rgba(124,92,255,.15);padding:2px 8px;border-radius:20px;flex-shrink:0}
.row-plays{font-size:12px;color:var(--muted);flex-shrink:0;min-width:50px;text-align:right}
.row-like{background:none;border:none;cursor:pointer;font-size:16px;flex-shrink:0;transition:transform .2s;padding:4px}
.row-like:hover{transform:scale(1.3)}
.row-dur{font-size:12px;color:var(--muted);flex-shrink:0;min-width:36px;text-align:right}

/* ── PLAYER ── */
.player{grid-row:2;grid-column:1/3;background:rgba(8,8,14,.98);border-top:1px solid var(--glass-border);display:flex;align-items:center;padding:0 28px;gap:20px;backdrop-filter:blur(30px)}
.player-cover{width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.player-info{min-width:0;width:200px;flex-shrink:0}
.player-title{font-family:var(--font-head);font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{font-size:12px;color:var(--muted)}
.player-like{background:none;border:none;cursor:pointer;font-size:18px;flex-shrink:0;transition:transform .2s;padding:4px}
.player-like:hover{transform:scale(1.3)}

.player-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.player-controls{display:flex;align-items:center;gap:18px}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;transition:all .2s;padding:4px}
.ctrl-btn:hover{color:var(--text);transform:scale(1.1)}
.ctrl-btn.active{color:var(--accent)}
.play-pause{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .25s;flex-shrink:0}
.play-pause:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(124,92,255,.5)}

.progress-wrap{width:100%;display:flex;align-items:center;gap:10px}
.time{font-size:11px;color:var(--muted);width:36px;flex-shrink:0}
.time.right{text-align:right}
.progress-bar{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:4px;cursor:pointer;position:relative;transition:height .2s}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s linear;position:relative}
.progress-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#fff;opacity:0;transition:opacity .2s}
.progress-bar:hover .progress-fill::after{opacity:1}

.player-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.vol-wrap{display:flex;align-items:center;gap:8px}
.vol-ico{font-size:15px;color:var(--muted)}
.vol-slider{width:80px;height:4px;background:rgba(255,255,255,.12);border-radius:4px;outline:none;-webkit-appearance:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}
.queue-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;transition:color .2s}
.queue-btn:hover{color:var(--text)}

/* ── UPLOAD MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--glass-border);border-radius:22px;width:100%;max-width:520px;padding:32px;position:relative;animation:modalIn .3s ease}
@keyframes modalIn{from{transform:scale(.95) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-close{position:absolute;top:18px;right:18px;background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;color:var(--muted);font-size:18px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--text);background:var(--glass-border)}
.modal h2{font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:6px}
.modal p.sub{color:var(--muted);font-size:13px;margin-bottom:24px}

.drop-zone{border:2px dashed var(--glass-border);border-radius:16px;padding:36px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:20px;position:relative}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent);background:rgba(124,92,255,.07)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:40px;margin-bottom:10px}
.drop-text{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--muted)}
.file-chosen{font-size:13px;color:var(--accent3);margin-top:8px;font-weight:500}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.form-grid.full{grid-template-columns:1fr}
.field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:var(--font-body);font-size:13.5px;outline:none;transition:all .3s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:rgba(124,92,255,.07)}
.field select option{background:var(--surface)}
.field textarea{resize:vertical;min-height:70px}

.upload-progress{display:none;margin-bottom:16px}
.upload-progress.show{display:block}
.up-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.up-bar{height:6px;background:var(--glass);border-radius:6px;overflow:hidden}
.up-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;width:0;transition:width .3s}

.submit-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:13px;padding:14px;cursor:pointer;color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;transition:all .3s;letter-spacing:.03em}
.submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,92,255,.5)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:110px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface2);border:1px solid var(--glass-border);border-radius:12px;padding:12px 18px;font-size:13.5px;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;max-width:320px;backdrop-filter:blur(20px)}
.toast.success{border-color:rgba(77,255,180,.3)}
.toast.error{border-color:rgba(255,77,109,.3)}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(120%);opacity:0}}

/* ── GENRE PILLS ── */
.genre-strip{display:flex;gap:8px;overflow-x:auto;margin-bottom:24px;padding-bottom:4px;scrollbar-width:none}
.genre-strip::-webkit-scrollbar{display:none}
.genre-pill{flex-shrink:0;padding:7px 16px;border-radius:30px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--glass-border);color:var(--muted);background:var(--glass);transition:all .2s;font-family:var(--font-head)}
.genre-pill:hover{color:var(--text);border-color:var(--accent)}
.genre-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── STATS CHIPS ── */
.stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat-chip{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:14px 18px;flex:1;min-width:100px}
.stat-num{font-family:var(--font-head);font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11.5px;color:var(--muted);margin-top:2px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:52px;margin-bottom:14px}
.empty h3{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty p{font-size:13.5px;max-width:300px;margin:0 auto}

/* ── SCROLLBAR ── */
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--glass-border);border-radius:6px}

/* ── EQUALIZER ANIMATION ── */
.eq{display:flex;align-items:flex-end;gap:2px;height:14px}
.eq span{width:2px;background:var(--accent);border-radius:1px;animation:eq .8s ease infinite}
.eq span:nth-child(2){animation-delay:.15s;height:60%}
.eq span:nth-child(3){animation-delay:.3s;height:100%}
.eq span:nth-child(4){animation-delay:.45s;height:40%}
@keyframes eq{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr var(--player-h)}
  .sidebar{display:none}
  .main{grid-column:1;padding:16px}
  .player{padding:0 14px;gap:12px}
  .player-info{width:120px}
  .vol-wrap{display:none}
  .hero{padding:20px}
  .hero-art{display:none}
}
</style>
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎵</div>
      <span class="logo-text">SoundWave</span>
    </div>

    <div class="nav-label">Discover</div>
    <button class="nav-item active" onclick="switchView('home')" id="nav-home">
      <span class="ico">🏠</span> Home
    </button>
    <button class="nav-item" onclick="switchView('trending')" id="nav-trending">
      <span class="ico">🔥</span> Trending
    </button>
    <button class="nav-item" onclick="switchView('recent')" id="nav-recent">
      <span class="ico">🆕</span> New Releases
    </button>
    <button class="nav-item" onclick="switchView('liked')" id="nav-liked">
      <span class="ico">❤️</span> Most Loved
    </button>
    <button class="nav-item" onclick="switchView('discover')" id="nav-discover">
      <span class="ico">🎲</span> Discover
    </button>

    <div class="nav-label">Library</div>
    <button class="nav-item" onclick="switchView('search')" id="nav-search">
      <span class="ico">🔍</span> Browse All
    </button>
    <button class="nav-item" onclick="switchView('myuploads')" id="nav-myuploads">
      <span class="ico">📁</span> My Uploads
    </button>

    <button class="upload-sidebar" onclick="openUpload()">
      ➕ Upload Music
    </button>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main" id="main-content">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input class="search-input" type="text" id="searchBox"
               placeholder="Search songs, artists, albums, genres..."
               oninput="onSearch(this.value)"/>
      </div>
      <button class="upload-top-btn" onclick="openUpload()">⬆ Upload</button>
    </div>

    <!-- Dynamic content renders here -->
    <div id="view-area"></div>
  </main>

  <!-- ══ PLAYER ══ -->
  <div class="player" id="player">
    <div class="player-cover" id="playerCover" style="background:#1a1a26;font-size:22px">🎵</div>
    <div class="player-info">
      <div class="player-title" id="playerTitle">Nothing playing</div>
      <div class="player-artist" id="playerArtist">Select a song to play</div>
    </div>
    <button class="player-like" id="playerLike" onclick="toggleCurrentLike()" title="Like">🤍</button>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
        <button class="ctrl-btn" onclick="prevSong()" title="Previous">⏮</button>
        <button class="play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextSong()" title="Next">⏭</button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">🔁</button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="curTime">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seekTo(event)">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <span class="time right" id="durTime">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <div class="vol-wrap">
        <span class="vol-ico">🔊</span>
        <input class="vol-slider" type="range" min="0" max="1" step="0.02" value="0.85"
               oninput="setVolume(this.value)" id="volSlider"/>
      </div>
      <button class="queue-btn" onclick="switchView('queue')" title="Queue">☰</button>
    </div>
  </div>
</div>

<!-- ══ TOAST CONTAINER ══ -->
<div class="toast-wrap" id="toasts"></div>

<!-- ══ AUDIO ELEMENT ══ -->
<audio id="audioEl" preload="auto"></audio>

<script>
/* ════════════════════════════════════════════
   SOUNDWAVE — JAVA-BACKED MUSIC PLATFORM
   Frontend JS — communicates with Spring Boot API
   ════════════════════════════════════════════ */

const API = '/api/songs';
const audio = document.getElementById('audioEl');

/* ── State ── */
let queue = [];          // current playback queue
let queueIndex = -1;     // index in queue
let currentSong = null;  // currently loaded song object
let allSongs = [];        // songs for current view
let likedIds = new Set(JSON.parse(localStorage.getItem('sw_liked')||'[]'));
let shuffle = false;
let repeat = false;       // 'off' | 'one' | 'all'
let repeatMode = 0;       // 0=off 1=one 2=all
let searchTimer = null;
let currentView = 'home';
let myUploads = JSON.parse(localStorage.getItem('sw_myuploads')||'[]');

/* ══ INIT ══ */
window.onload = () => {
  audio.volume = 0.85;
  bindAudioEvents();
  switchView('home');
};

/* ══ AUDIO EVENTS ══ */
function bindAudioEvents() {
  audio.ontimeupdate = () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('curTime').textContent = fmtTime(audio.currentTime);
  };
  audio.ondurationchange = () => {
    document.getElementById('durTime').textContent = fmtTime(audio.duration);
  };
  audio.onended = () => {
    if (repeatMode === 1) { audio.currentTime = 0; audio.play(); return; }
    nextSong();
  };
  audio.onplay = () => document.getElementById('playPauseBtn').textContent = '⏸';
  audio.onpause = () => document.getElementById('playPauseBtn').textContent = '▶';
  audio.onerror = () => toast('❌ Could not load audio', 'error');
}

/* ══ PLAY CONTROLS ══ */
function togglePlay() {
  if (!currentSong) return;
  audio.paused ? audio.play() : audio.pause();
}
function prevSong() {
  if (queue.length === 0) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  queueIndex = (queueIndex - 1 + queue.length) % queue.length;
  playSong(queue[queueIndex]);
}
function nextSong() {
  if (queue.length === 0) return;
  if (shuffle) {
    queueIndex = Math.floor(Math.random() * queue.length);
  } else {
    if (repeatMode === 2) queueIndex = (queueIndex + 1) % queue.length;
    else if (queueIndex < queue.length - 1) queueIndex++;
    else return;
  }
  playSong(queue[queueIndex]);
}
function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleBtn').style.color = shuffle ? 'var(--accent)' : '';
  toast(shuffle ? '🔀 Shuffle on' : '🔀 Shuffle off', 'info');
}
function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const icons = ['🔁','🔂','🔁'];
  const colors = ['','var(--accent)','var(--accent)'];
  const btn = document.getElementById('repeatBtn');
  btn.textContent = icons[repeatMode];
  btn.style.color = colors[repeatMode];
  const msgs = ['Repeat off','Repeat one','Repeat all'];
  toast(msgs[repeatMode], 'info');
}
function seekTo(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}
function setVolume(v) { audio.volume = parseFloat(v); }

/* ══ PLAY A SONG ══ */
function playSong(song) {
  currentSong = song;
  const src = `${API}/${song.id}/stream`;
  if (audio.src !== location.origin + src) {
    audio.src = src;
  }
  audio.play().catch(()=>{});

  // Update player UI
  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerArtist').textContent = song.artist || 'Unknown';
  const cover = document.getElementById('playerCover');
  cover.style.background = song.coverColor || '#1a1a26';
  cover.textContent = genreEmoji(song.genre);
  document.getElementById('playerLike').textContent = likedIds.has(song.id) ? '❤️' : '🤍';

  // Update card highlights
  document.querySelectorAll('.song-card').forEach(c => c.classList.remove('playing'));
  document.querySelectorAll('.song-row').forEach(r => r.classList.remove('playing'));
  document.querySelectorAll(`[data-sid="${song.id}"]`).forEach(el => el.classList.add('playing'));
}

function playFromQueue(songList, index) {
  queue = songList;
  queueIndex = index;
  playSong(songList[index]);
}

/* ══ LIKE ══ */
async function toggleLike(songId, btn) {
  const liked = likedIds.has(songId);
  try {
    await fetch(`${API}/${songId}/like?like=${!liked}`, {method:'POST'});
    if (liked) { likedIds.delete(songId); if(btn) btn.textContent='🤍'; }
    else { likedIds.add(songId); if(btn) btn.textContent='❤️'; }
    localStorage.setItem('sw_liked', JSON.stringify([...likedIds]));
    if (currentSong && currentSong.id === songId)
      document.getElementById('playerLike').textContent = likedIds.has(songId)?'❤️':'🤍';
  } catch(e) { toast('Failed to like', 'error'); }
}
async function toggleCurrentLike() {
  if (!currentSong) return;
  const btn = document.getElementById('playerLike');
  toggleLike(currentSong.id, btn);
}

/* ══ SEARCH ══ */
function onSearch(val) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (val.trim()) {
      switchView('search', val.trim());
    } else {
      switchView('home');
    }
  }, 400);
}

/* ══ VIEW ROUTER ══ */
async function switchView(view, param) {
  currentView = view;
  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view);
  if (navEl) navEl.classList.add('active');

  const area = document.getElementById('view-area');
  area.innerHTML = `<div class="empty"><div class="empty-ico">⏳</div><h3>Loading...</h3></div>`;

  try {
    switch(view) {
      case 'home': await renderHome(area); break;
      case 'trending': await renderListView(area, `${API}/trending`, '🔥 Trending Now', 'Most played songs globally'); break;
      case 'recent': await renderListView(area, `${API}/recent`, '🆕 New Releases', 'Fresh uploads from the community'); break;
      case 'liked': await renderListView(area, `${API}/liked`, '❤️ Most Loved', 'Songs the world loves'); break;
      case 'discover': await renderListView(area, `${API}/discover`, '🎲 Discover', 'Random picks just for you'); break;
      case 'search': await renderSearch(area, param || ''); break;
      case 'myuploads': renderMyUploads(area); break;
      case 'queue': renderQueue(area); break;
      default: await renderHome(area);
    }
  } catch(e) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">😵</div><h3>Oops!</h3><p>${e.message}</p></div>`;
  }
}

/* ══ HOME VIEW ══ */
async function renderHome(area) {
  const [trending, recent, discover, genres] = await Promise.all([
    fetch(`${API}/trending`).then(r=>r.json()),
    fetch(`${API}/recent`).then(r=>r.json()),
    fetch(`${API}/discover`).then(r=>r.json()),
    fetch(`${API}/genres`).then(r=>r.json()),
  ]);

  const totalSongs = (await fetch(`${API}/search?size=1`).then(r=>r.json())).totalElements || 0;

  area.innerHTML = `
    <div class="hero">
      <div class="hero-text">
        <h1>Music has <span>no borders.</span></h1>
        <p>Upload, discover, and stream music from every corner of the world — all in one place. Free. Forever.</p>
      </div>
      <div class="hero-art">🌍</div>
    </div>

    <div class="stats-row">
      <div class="stat-chip"><div class="stat-num">${totalSongs.toLocaleString()}</div><div class="stat-label">Songs Uploaded</div></div>
      <div class="stat-chip"><div class="stat-num">${genres.length}</div><div class="stat-label">Genres</div></div>
      <div class="stat-chip"><div class="stat-num">${(trending[0]?.playCount||0).toLocaleString()}</div><div class="stat-label">Top Song Plays</div></div>
    </div>

    ${genres.length ? `
    <div class="genre-strip" id="genreStrip">
      <div class="genre-pill active" onclick="filterGenre(null,this)">All</div>
      ${genres.map(g=>`<div class="genre-pill" onclick="filterGenre('${g.genre}',this)">${genreEmoji(g.genre)} ${g.genre} <span style="opacity:.5;font-size:11px">${g.count}</span></div>`).join('')}
    </div>` : ''}

    ${trending.length ? `
    <div class="sec-head"><span class="sec-title">🔥 Trending</span><button class="sec-more" onclick="switchView('trending')">See all</button></div>
    <div class="cards-row" id="trendingCards">${trending.slice(0,12).map((s,i)=>songCard(s,trending,i)).join('')}</div>
    <br/>` : ''}

    ${recent.length ? `
    <div class="sec-head"><span class="sec-title">🆕 New Releases</span><button class="sec-more" onclick="switchView('recent')">See all</button></div>
    <div class="cards-row">${recent.slice(0,12).map((s,i)=>songCard(s,recent,i)).join('')}</div>
    <br/>` : ''}

    ${discover.length ? `
    <div class="sec-head"><span class="sec-title">🎲 Discover</span><button class="sec-more" onclick="switchView('discover')">Refresh</button></div>
    <div class="song-list">${discover.slice(0,8).map((s,i)=>songRow(s,discover,i)).join('')}</div>` : ''}

    ${totalSongs === 0 ? `
    <div class="empty">
      <div class="empty-ico">🎵</div>
      <h3>Be the first to upload!</h3>
      <p>No songs yet. Share your music with the world.</p><br/>
      <button class="upload-top-btn" onclick="openUpload()">⬆ Upload Now</button>
    </div>` : ''}
  `;
}

/* ══ LIST VIEW (trending / recent / liked / discover) ══ */
async function renderListView(area, url, title, subtitle) {
  const songs = await fetch(url).then(r=>r.json());
  allSongs = songs;
  area.innerHTML = `
    <div style="margin-bottom:22px">
      <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:4px">${title}</h2>
      <p style="color:var(--muted);font-size:13px">${subtitle}</p>
    </div>
    ${songs.length
      ? `<div class="song-list">${songs.map((s,i)=>songRow(s,songs,i)).join('')}</div>`
      : `<div class="empty"><div class="empty-ico">🎵</div><h3>Nothing here yet</h3><p>Upload some music to get started!</p></div>`}
  `;
}

/* ══ SEARCH VIEW ══ */
async function renderSearch(area, query) {
  const url = query ? `${API}/search?q=${encodeURIComponent(query)}&size=40` : `${API}/search?size=40`;
  const data = await fetch(url).then(r=>r.json());
  const songs = data.songs || [];
  allSongs = songs;
  area.innerHTML = `
    <div style="margin-bottom:20px">
      <h2 style="font-family:var(--font-head);font-size:20px;font-weight:800;margin-bottom:4px">
        ${query ? `Results for "${query}"` : 'Browse All Music'}
      </h2>
      <p style="color:var(--muted);font-size:13px">${data.totalElements || songs.length} songs found</p>
    </div>
    ${songs.length
      ? `<div class="song-list">${songs.map((s,i)=>songRow(s,songs,i)).join('')}</div>`
      : `<div class="empty"><div class="empty-ico">🔍</div><h3>No results</h3><p>Try a different search or upload the song!</p></div>`}
  `;
}

/* ══ MY UPLOADS ══ */
function renderMyUploads(area) {
  if (!myUploads.length) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">📁</div><h3>No uploads yet</h3><p>Upload your first song and it'll appear here.</p><br/><button class="upload-top-btn" onclick="openUpload()">⬆ Upload Now</button></div>`;
    return;
  }
  area.innerHTML = `
    <div style="margin-bottom:22px">
      <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:4px">📁 My Uploads</h2>
      <p style="color:var(--muted);font-size:13px">${myUploads.length} song${myUploads.length>1?'s':''} uploaded in this session</p>
    </div>
    <div class="song-list">${myUploads.map((s,i)=>songRow(s,myUploads,i,true)).join('')}</div>
  `;
}

/* ══ QUEUE VIEW ══ */
function renderQueue(area) {
  if (!queue.length) {
    area.innerHTML = `<div class="empty"><div class="empty-ico">☰</div><h3>Queue is empty</h3><p>Play a song to start building your queue.</p></div>`;
    return;
  }
  area.innerHTML = `
    <div style="margin-bottom:22px">
      <h2 style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:4px">☰ Up Next</h2>
      <p style="color:var(--muted);font-size:13px">${queue.length} songs in queue</p>
    </div>
    <div class="song-list">${queue.map((s,i)=>songRow(s,queue,i)).join('')}</div>
  `;
}

/* ══ GENRE FILTER ══ */
async function filterGenre(genre, el) {
  document.querySelectorAll('#genreStrip .genre-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  if (!genre) { await renderHome(document.getElementById('view-area')); return; }
  const data = await fetch(`${API}/search?q=${encodeURIComponent(genre)}&size=40`).then(r=>r.json());
  const songs = data.songs || [];
  const list = document.getElementById('view-area');
  // just refresh the discover list
  const discoverSec = list.querySelector('.song-list');
  if (discoverSec) discoverSec.innerHTML = songs.map((s,i)=>songRow(s,songs,i)).join('');
}

/* ══ SONG CARD (horizontal) ══ */
function songCard(song, list, index) {
  const isLiked = likedIds.has(song.id);
  const isPlaying = currentSong && currentSong.id === song.id;
  return `
    <div class="song-card ${isPlaying?'playing':''}" data-sid="${song.id}" onclick="playFromQueue(${JSON.stringify(list).replace(/"/g,'&quot;')},${index})">
      <div class="card-cover" style="background:${song.coverColor||'#1a1a26'}">
        ${genreEmoji(song.genre)}
        <div class="play-overlay">${isPlaying?'<div class="eq"><span></span><span></span><span></span><span></span></div>':'▶'}</div>
      </div>
      <div class="card-title" title="${esc(song.title)}">${esc(song.title)}</div>
      <div class="card-artist">${esc(song.artist||'Unknown')}</div>
      <div class="card-plays">▶ ${fmtNum(song.playCount)} plays</div>
    </div>`;
}

/* ══ SONG ROW (list) ══ */
function songRow(song, list, index, showDelete) {
  const isLiked = likedIds.has(song.id);
  const isPlaying = currentSong && currentSong.id === song.id;
  return `
    <div class="song-row ${isPlaying?'playing':''}" data-sid="${song.id}">
      <div class="row-num" onclick="playFromQueue(${JSON.stringify(list).replace(/"/g,'&quot;')},${index})" style="cursor:pointer">
        ${isPlaying?`<div class="eq"><span></span><span></span><span></span><span></span></div>`:index+1}
      </div>
      <div class="row-cover" style="background:${song.coverColor||'#1a1a26'};cursor:pointer"
           onclick="playFromQueue(${JSON.stringify(list).replace(/"/g,'&quot;')},${index})">
        ${genreEmoji(song.genre)}
      </div>
      <div class="row-info" onclick="playFromQueue(${JSON.stringify(list).replace(/"/g,'&quot;')},${index})" style="cursor:pointer">
        <div class="row-title">${esc(song.title)}</div>
        <div class="row-artist">${esc(song.artist||'Unknown')}</div>
      </div>
      ${song.genre?`<div class="row-genre">${esc(song.genre)}</div>`:''}
      <div class="row-plays">▶ ${fmtNum(song.playCount)}</div>
      <button class="row-like" onclick="toggleLike(${song.id},this)" title="Like">
        ${isLiked?'❤️':'🤍'}
      </button>
      ${showDelete?`<button class="row-like" onclick="deleteSong(${song.id})" title="Delete" style="font-size:14px">🗑️</button>`:''}
    </div>`;
}

/* ══ DELETE ══ */
async function deleteSong(id) {
  if (!confirm('Delete this song?')) return;
  try {
    await fetch(`${API}/${id}`,{method:'DELETE'});
    myUploads = myUploads.filter(s=>s.id!==id);
    localStorage.setItem('sw_myuploads',JSON.stringify(myUploads));
    toast('🗑️ Song deleted','success');
    switchView('myuploads');
  } catch(e){ toast('Failed to delete','error'); }
}

/* ══ UPLOAD ══ */
function openUpload() { document.getElementById('uploadModal').classList.add('open'); }
function closeUpload() { document.getElementById('uploadModal').classList.remove('open'); }

// Close on backdrop click
document.getElementById('uploadModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeUpload();
});

// Drag and drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('fileInput').files = e.dataTransfer.files; onFileChosen({files:[file]}); }
});

function onFileChosen(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('fileChosen').textContent = `✅ ${file.name} (${fmtSize(file.size)})`;
  // Auto-fill title
  const nameNoExt = file.name.replace(/\.[^.]+$/,'');
  if (!document.getElementById('f-title').value) document.getElementById('f-title').value = nameNoExt;
}

async function submitUpload() {
  const fileInput = document.getElementById('fileInput');
  if (!fileInput.files[0]) { toast('Please select an audio file', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Uploading...';

  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('title', document.getElementById('f-title').value || fileInput.files[0].name);
  fd.append('artist', document.getElementById('f-artist').value);
  fd.append('album', document.getElementById('f-album').value);
  fd.append('genre', document.getElementById('f-genre').value);
  fd.append('uploaderName', document.getElementById('f-uploader').value);
  fd.append('description', document.getElementById('f-desc').value);
  fd.append('tags', document.getElementById('f-tags').value);

  // Progress via XHR for real progress events
  const prog = document.getElementById('uploadProgress');
  prog.classList.add('show');

  try {
    const song = await uploadWithProgress(fd, pct => {
      document.getElementById('upFill').style.width = pct + '%';
      document.getElementById('upPct').textContent = pct + '%';
      document.getElementById('upStatus').textContent = pct < 100 ? 'Uploading...' : 'Processing...';
    });

    myUploads.unshift(song);
    localStorage.setItem('sw_myuploads', JSON.stringify(myUploads));
    toast(`🎵 "${song.title}" uploaded successfully!`, 'success');
    closeUpload();
    resetUploadForm();
    playSong(song); // auto-play
    switchView('home');
  } catch(e) {
    toast('Upload failed: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = '⬆ Upload to SoundWave';
  prog.classList.remove('show');
}

function uploadWithProgress(fd, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API}/upload`);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) onProgress(Math.round((e.loaded/e.total)*100));
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('Invalid server response')); }
      } else {
        try { reject(new Error(JSON.parse(xhr.responseText).error || 'Upload failed')); }
        catch(e) { reject(new Error('Upload failed')); }
      }
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(fd);
  });
}

function resetUploadForm() {
  document.getElementById('fileInput').value = '';
  document.getElementById('fileChosen').textContent = '';
  ['f-title','f-artist','f-album','f-uploader','f-desc','f-tags'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-genre').value = 'Other';
  document.getElementById('upFill').style.width = '0%';
}

/* ══ TOAST ══ */
function toast(msg, type='info') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.animation='toastOut .3s ease forwards'; setTimeout(()=>el.remove(),300); }, 3200);
}

/* ══ HELPERS ══ */
function fmtTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}
function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}
function fmtSize(b) {
  if (b >= 1073741824) return (b/1073741824).toFixed(1)+' GB';
  if (b >= 1048576) return (b/1048576).toFixed(1)+' MB';
  return (b/1024).toFixed(0)+' KB';
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function genreEmoji(g) {
  const map = {'Pop':'🎤','Rock':'🎸','Hip-Hop':'🎧','Electronic':'🎛','Jazz':'🎷',
    'Classical':'🎻','R&B':'🎹','Country':'🤠','Indie':'🌿','Metal':'🤘',
    'Folk':'🪕','Lo-Fi':'☕','Bollywood':'💃','K-Pop':'⭐','Afrobeat':'🥁',
    'Reggae':'🌴','Blues':'🎺','Other':'🎵'};
  return map[g] || '🎵';
}
