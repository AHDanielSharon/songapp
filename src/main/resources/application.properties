# Server
server.port=${PORT:10000}

# Application name
spring.application.name=SoundWave

# H2 Database (persistent file mode for Render)
spring.datasource.url=jdbc:h2:file:./soundwave-db;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (disable in production)
spring.h2.console.enabled=false

# File upload - NO SIZE LIMIT
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
spring.servlet.multipart.file-size-threshold=2MB

# Upload directory
soundwave.upload.dir=uploads

# Logging
logging.level.com.soundwave=INFO
logging.level.org.springframework.web=WARN

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
